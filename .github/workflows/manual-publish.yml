name: Manual Publish Ecosystems
on: workflow_dispatch
jobs:
  publish_ecosystems:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f
        with:
          python-version: "3.11"

      - name: Install Python build tools
        run: pip install build twine hatchling

      - name: Build & Publish PyPI Package llm-as-dom-mcp
        working-directory: ./python
        run: |
          # Use the original pyproject.toml
          cp pyproject.toml pyproject.toml.bak # backup
          sed -i "s/^name = .*/name = \"llm-as-dom-mcp\"/" pyproject.toml
          if ! grep -q "^\[tool\.hatch\.build\.targets\.wheel\]" pyproject.toml; then
            echo -e "\n[tool.hatch.build.targets.wheel]\npackages = [\"llm_as_dom_mcp\"]" >> pyproject.toml
          fi
          
          rm -rf dist/
          python -m build .

      - name: Publish PyPI Package (llm-as-dom-mcp)
        uses: pypa/gh-action-pypi-publish@8a08d616893759ef8e1aa1f2785787c0b97e20d6
        with:
          packages-dir: python/dist/
