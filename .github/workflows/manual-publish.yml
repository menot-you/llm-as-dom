name: Manual Publish Ecosystems
on: workflow_dispatch
jobs:
  publish_ecosystems:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Publish NPM Package @menot-you/mcp-lad (Skipped)
        run: echo "@menot-you/mcp-lad 0.12.0 is already published."

      - name: Publish NPM Package llm-as-dom (Skipped)
        run: echo "llm-as-dom 0.12.0 is already published."

      - name: Set up Python
        uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f
        with:
          python-version: "3.11"

      - name: Install Python build tools
        run: pip install build twine hatchling

      - name: Build & Publish PyPI Package llm-as-dom
        working-directory: ./python
        run: |
          cp pyproject.llm-as-dom.toml pyproject.toml
          rm -rf dist/
          python -m build

      - name: Publish PyPI Package (llm-as-dom)
        uses: pypa/gh-action-pypi-publish@8a08d616893759ef8e1aa1f2785787c0b97e20d6
        with:
          packages-dir: python/dist/
          
      - name: Build & Publish PyPI Package llm-as-dom-mcp
        working-directory: ./python
        run: |
          cp pyproject.llm-as-dom-mcp.toml pyproject.toml
          rm -rf dist/
          python -m build

      - name: Publish PyPI Package (llm-as-dom-mcp)
        uses: pypa/gh-action-pypi-publish@8a08d616893759ef8e1aa1f2785787c0b97e20d6
        with:
          packages-dir: python/dist/
