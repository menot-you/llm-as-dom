name: Manual Publish Ecosystems
on: workflow_dispatch
jobs:
  publish-ecosystems:
    name: Publish NPM and PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Python
        uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f
        with:
          python-version: "3.11"

      - name: Install Python build tools
        run: pip install build twine hatchling

      - name: Build Python Package (llm-as-dom)
        working-directory: ./python
        run: |
          sed -i "s/^name = .*/name = \"llm-as-dom\"/" pyproject.toml
          cat << 'INNER_EOF' >> pyproject.toml

[tool.hatch.build.targets.wheel]
packages = ["menot_you_mcp_lad"]
INNER_EOF
          rm -rf dist/
          python -m build

      - name: Publish PyPI Package (llm-as-dom)
        uses: pypa/gh-action-pypi-publish@8a08d616893759ef8e1aa1f2785787c0b97e20d6
        with:
          packages-dir: python/dist/

      - name: Build Python Package (llm-as-dom-mcp)
        working-directory: ./python
        run: |
          git restore pyproject.toml
          sed -i "s/^name = .*/name = \"llm-as-dom-mcp\"/" pyproject.toml
          cat << 'INNER_EOF' >> pyproject.toml

[tool.hatch.build.targets.wheel]
packages = ["menot_you_mcp_lad"]
INNER_EOF
          rm -rf dist/
          python -m build

      - name: Publish PyPI Package (llm-as-dom-mcp)
        uses: pypa/gh-action-pypi-publish@8a08d616893759ef8e1aa1f2785787c0b97e20d6
        with:
          packages-dir: python/dist/
