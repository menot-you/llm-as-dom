name: Manual Publish Ecosystems
on: workflow_dispatch
jobs:
  publish_ecosystems:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Publish NPM Package @menot-you/mcp-lad (Skipped)
        run: echo "@menot-you/mcp-lad 0.12.0 is already published."

      - name: Publish NPM Package llm-as-dom (Skipped)
        run: echo "llm-as-dom 0.12.0 is already published."

      - name: Set up Python
        uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f
        with:
          python-version: "3.11"

      - name: Install Python build tools and toml
        run: pip install build twine hatchling toml

      - name: Debug PyPI Package llm-as-dom
        working-directory: ./python
        run: |
          set -x
          VERSION="0.12.0"
          python update_pyproject.py pyproject.toml "llm-as-dom" "$VERSION" "llm_as_dom_mcp"

      - name: Publish PyPI Package (llm-as-dom) (Skipped for Debug)
        run: echo "Skipping publish step for debug."
          
      - name: Debug PyPI Package llm-as-dom-mcp
        working-directory: ./python
        run: |
          set -x
          VERSION="0.12.0"
          python update_pyproject.py pyproject.toml "llm-as-dom-mcp" "$VERSION" "llm_as_dom_mcp"

      - name: Publish PyPI Package (llm-as-dom-mcp) (Skipped for Debug)
        run: echo "Skipping publish step for debug."
