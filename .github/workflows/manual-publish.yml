name: Manual Publish Ecosystems
on: workflow_dispatch
jobs:
  publish_ecosystems:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a
        with:
          node-version: 20 # Use Node.js 20, as setup-node@v4 supports it.
          registry-url: 'https://registry.npmjs.org'

      - name: Publish NPM Package @menot-you/mcp-lad (Skipped)
        run: echo "@menot-you/mcp-lad 0.12.0 is already published."

      - name: Publish NPM Package llm-as-dom (Skipped)
        run: echo "llm-as-dom 0.12.0 is already published."

      - name: Set up Python
        uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f
        with:
          python-version: "3.11"

      - name: Install Python build tools
        run: pip install build twine hatchling

      - name: Prepare Python Build Function
        id: prepare_python_build
        run: |
          echo 'function build_and_publish_pypi() {
            local PACKAGE_NAME=$1
            local VERSION=$2
            local ORIGINAL_NAME="menot-you-mcp-lad"

            echo "Building and publishing $PACKAGE_NAME version $VERSION to PyPI"

            git restore python/pyproject.toml || true # Ensure clean state before modification

            # Update project name and version
            sed -i "s/^name = .*/name = \"$PACKAGE_NAME\"/" python/pyproject.toml
            sed -i "s/^version = .*/version = \"$VERSION\"/" python/pyproject.toml

            # Ensure hatchling wheel config is present
            if ! grep -q "^\[tool\.hatch\.build\.targets\.wheel\]" python/pyproject.toml; then
              echo -e "\n[tool.hatch.build.targets.wheel]\npackages = [\"menot_you_mcp_lad\"]" >> python/pyproject.toml
            fi

            rm -rf python/dist/
            python -m build python/

            # Use gh-action-pypi-publish action for publication
            # This step will be run inline in the workflow
          }' >> $GITHUB_OUTPUT

      - name: Build & Publish PyPI Package llm-as-dom
        run: |
          # Call the function defined above
          PACKAGE_NAME="llm-as-dom"
          VERSION="0.12.0"
          build_and_publish_pypi "$PACKAGE_NAME" "$VERSION"
        working-directory: ./python
      - name: Publish PyPI Package (llm-as-dom)
        uses: pypa/gh-action-pypi-publish@8a08d616893759ef8e1aa1f2785787c0b97e20d6
        with:
          packages-dir: python/dist/

      - name: Build & Publish PyPI Package llm-as-dom-mcp
        run: |
          # Call the function defined above
          PACKAGE_NAME="llm-as-dom-mcp"
          VERSION="0.12.0"
          build_and_publish_pypi "$PACKAGE_NAME" "$VERSION"
        working-directory: ./python
      - name: Publish PyPI Package (llm-as-dom-mcp)
        uses: pypa/gh-action-pypi-publish@8a08d616893759ef8e1aa1f2785787c0b97e20d6
        with:
          packages-dir: python/dist/
