name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: llm-as-dom-runners
    env:
      BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
    steps:
      - name: Preflight — require BENCHER_API_TOKEN
        id: preflight
        run: |
          if [ -z "${BENCHER_API_TOKEN}" ]; then
            echo "::notice::BENCHER_API_TOKEN not configured — skipping benchmark"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: steps.preflight.outputs.skip != 'true'

      - name: Install build toolchain (gcc, pkg-config)
        if: steps.preflight.outputs.skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config

      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        if: steps.preflight.outputs.skip != 'true'

      - uses: bencherdev/bencher@f027b2a20a3a56d4e525a7e7bdd742f4d02c6a82 # main
        if: steps.preflight.outputs.skip != 'true'

      - name: Run benchmarks with bencher
        if: steps.preflight.outputs.skip != 'true'
        run: >
          bencher run
          --project llm-as-dom
          --token "$BENCHER_API_TOKEN"
          --branch '${{ github.ref_name }}'
          --adapter rust_criterion
          --err
          cargo bench
