name: Release-plz

permissions:
  pull-requests: write
  contents: write

on:
  push:
    branches:
      - main

# release-plz manages state; if two run at once they race on PRs and tags.
concurrency:
  group: release-plz
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  release-plz:
    name: Release-plz
    runs-on: llm-as-dom-runners
    outputs:
      releases_created: ${{ steps.release-plz.outputs.releases_created }}
      version: ${{ steps.parse_version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install build toolchain (gcc, pkg-config)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config

      - name: Install gh CLI (required by release-plz/git-config)
        run: |
          set -euo pipefail
          GH_VERSION="2.64.0"
          curl -fsSL "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz --strip-components=1 -C /usr/local "gh_${GH_VERSION}_linux_amd64/bin/gh"
          gh --version

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly

      - id: release-plz
        name: Run release-plz
        uses: MarcoIeni/release-plz-action@ef08e716ba77de37dd17b19d72ed171a2e1b63ab # v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - id: parse_version
        name: Extract published version from cargo
        if: steps.release-plz.outputs.releases_created == 'true'
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | awk -F '"' '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  publish-ecosystems:
    name: Publish NPM and PyPI
    needs: release-plz
    if: needs.release-plz.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for PyPI trusted publishing
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Update versions in files
        run: |
          VERSION="${{ needs.release-plz.outputs.version }}"
          echo "$VERSION" > VERSION
          
          # Bump npm
          cd npm
          node -e "
            const p = require('./package.json');
            p.version = '$VERSION';
            require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "
          cd ..
          
          # Bump Python
          sed -i "s/^version = .*/version = \"$VERSION\"/" python/pyproject.toml
          
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION npm/package.json python/pyproject.toml
          git commit -m "chore: sync ecosystems versions to v$VERSION [skip ci]"
          git push origin main

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Publish NPM Package
        working-directory: ./npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install Python build tools
        run: pip install build twine hatchling

      - name: Build Python Package
        working-directory: ./python
        run: python -m build

      - name: Publish PyPI Package
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: python/dist/
