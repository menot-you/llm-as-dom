name: Release-plz

permissions:
  pull-requests: write
  contents: write

on:
  push:
    branches:
      - main

jobs:
  release-plz:
    name: Release-plz
    runs-on: llm-as-dom-runners
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install build toolchain (gcc, pkg-config)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config

      - name: Install gh CLI (required by release-plz/git-config)
        run: |
          set -euo pipefail
          GH_VERSION="2.64.0"
          curl -fsSL "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz --strip-components=1 -C /usr/local "gh_${GH_VERSION}_linux_amd64/bin/gh"
          gh --version

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly

      - name: Run release-plz
        uses: MarcoIeni/release-plz-action@ef08e716ba77de37dd17b19d72ed171a2e1b63ab # v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
