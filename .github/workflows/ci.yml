name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Keep at most one active run per ref. Rapid-fire pushes cancel older
# runs instead of piling up and starving the 3-slot self-hosted pool.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Security & Quality ─────────────────────────────────────────────
  deny:
    name: cargo deny
    runs-on: llm-as-dom-runners
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
      - uses: taiki-e/install-action@095d17ff8e68bec1be4a23180d476e78015114e4 # cargo-deny
      - name: cargo deny check
        run: cargo deny check

  audit:
    name: cargo audit
    runs-on: llm-as-dom-runners
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install build toolchain (gcc, pkg-config)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  coverage:
    name: coverage
    runs-on: llm-as-dom-runners
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install build toolchain (gcc, pkg-config)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@2d5b196a2dc9984a136f1a2a41e1a33631d7c261 # cargo-llvm-cov
      - name: Generate code coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        # Non-blocking: CODECOV_TOKEN is not set yet. codecov-action@v4 requires the
        # token (v3 allowed tokenless uploads for public repos). Remove this flag
        # once the secret is provisioned at the repo/org level.
        continue-on-error: true
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info

  msrv:
    name: msrv pinned
    runs-on: llm-as-dom-runners
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install build toolchain (gcc, pkg-config)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          # Bumped from nightly-2025-08-01 (rustc 1.88) — src/mcp_server/tools/browse.rs
          # uses ceil_char_boundary (feature round_char_boundary), stabilized in 1.93.
          toolchain: nightly-2025-12-01
      - name: cargo check
        run: cargo check --all-targets --all-features

  # ── Check ──────────────────────────────────────────────────────────
  check:
    name: fmt + clippy + test
    runs-on: llm-as-dom-runners
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install build toolchain (gcc, pkg-config)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config

      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test (unit only)
        run: cargo test

  # ── Build ──────────────────────────────────────────────────────────
  build:
    name: build release
    runs-on: llm-as-dom-runners
    needs: check
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install build toolchain (gcc, pkg-config)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config

      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build lad
        run: cargo build --release --bin lad

      - name: Build llm-as-dom-mcp
        run: cargo build --release --bin llm-as-dom-mcp

      - name: Build lad-relay
        run: cargo build --release --bin lad-relay

      - name: Upload binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binaries-linux-x86_64
          path: |
            target/release/lad
            target/release/llm-as-dom-mcp
            target/release/lad-relay

  # ── Fixture Tests ──────────────────────────────────────────────────
  # Build-once, test-many: consume the `lad` binary produced by the `build`
  # job instead of re-compiling inside the Kata microVM. Kata's virtio-net
  # (via Cloud Hypervisor) has high throughput variance under load (measured
  # 9x range on the same rustup install vs ~1x under runc). Running cargo
  # + rustup inside the microVM made CI flaky. Downloading a ~30MB artifact
  # is a 10s operation with small blast radius if the network hiccups.
  fixture-tests:
    name: fixture tests (chrome + local server)
    runs-on: llm-as-dom-kata-runners
    needs: build
    env:
      # cloakbrowser has no pinned build for runner host — fall back to default Chromium.
      LAD_CLOAK_DISABLE: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binaries-linux-x86_64
          path: target/release

      - name: Restore executable bit
        run: chmod +x target/release/lad

      - name: Run fixture smoke tests
        run: ./fixtures/smoke_test.sh ./target/release/lad

  # ── Integration ────────────────────────────────────────────────────
  integration:
    name: integration (chrome)
    runs-on: llm-as-dom-kata-runners
    needs: build
    env:
      LAD_CLOAK_DISABLE: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binaries-linux-x86_64
          path: target/release

      - name: Restore executable bit
        run: chmod +x target/release/lad

      - name: Smoke test — example.com extraction
        run: |
          timeout 60 ./target/release/lad --url "https://example.com" --extract-only || exit 1

      - name: Smoke test — HN login extraction
        run: |
          timeout 60 ./target/release/lad --url "https://news.ycombinator.com/login" --extract-only || exit 1

  # ── LLM Smoke Test (Z.AI) ───────────────────────────────────────────
  llm-smoke:
    name: llm smoke (Z.AI GLM)
    runs-on: llm-as-dom-runners
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      Z_AI_API_KEY: ${{ secrets.Z_AI_API_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run LLM benchmark (Z.AI models only)
        run: |
          python3 bench/run_benchmark.py 2>&1 | tee /tmp/bench-results.txt
          # Fail if any model scored 0
          if grep -q "0/4" /tmp/bench-results.txt; then
            echo "FAIL: at least one model scored 0/4"
            exit 1
          fi

      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: llm-benchmark-results
          path: bench/results.json

  # ── Release (cross-platform binaries) ──────────────────────────────
  # Tags are created by release.yml (workflow_dispatch), not auto-tag.
  release:
    name: release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check, build, fixture-tests, integration]
    strategy:
      matrix:
        include:
          - os: llm-as-dom-runners
            target: x86_64-unknown-linux-gnu
            artifact: linux-x86_64
          - os: [self-hosted, macos]
            target: aarch64-apple-darwin
            artifact: macos-arm64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install build toolchain (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config

      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build WebKit bridge (macOS only)
        if: runner.os == 'macOS'
        run: |
          cd webkit-bridge
          swift build -c release
          cp .build/release/lad-webkit-bridge ../target/${{ matrix.target }}/release/ || true

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/lad dist/lad-${{ matrix.artifact }} || true
          cp target/${{ matrix.target }}/release/llm-as-dom-mcp dist/llm-as-dom-mcp-${{ matrix.artifact }} || true
          cp target/${{ matrix.target }}/release/lad-relay dist/lad-relay-${{ matrix.artifact }} || true
          cp target/${{ matrix.target }}/release/lad-webkit-bridge dist/lad-webkit-bridge-${{ matrix.artifact }} 2>/dev/null || true

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.artifact }}
          path: dist/

  # ── Publish GitHub Release ─────────────────────────────────────────
  publish-release:
    name: publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: llm-as-dom-runners
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download linux artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-linux-x86_64
          path: dist/

      - name: Download macos artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-macos-arm64
          path: dist/

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
        
      - name: Sign binaries
        run: |
          cosign sign-blob --yes dist/lad-linux-x86_64 --bundle dist/lad-linux-x86_64.bundle
          if [ -f dist/llm-as-dom-mcp-linux-x86_64 ]; then cosign sign-blob --yes dist/llm-as-dom-mcp-linux-x86_64 --bundle dist/llm-as-dom-mcp-linux-x86_64.bundle; fi
          cosign sign-blob --yes dist/lad-macos-arm64 --bundle dist/lad-macos-arm64.bundle
          if [ -f dist/llm-as-dom-mcp-macos-arm64 ]; then cosign sign-blob --yes dist/llm-as-dom-mcp-macos-arm64 --bundle dist/llm-as-dom-mcp-macos-arm64.bundle; fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          generate_release_notes: true
          files: dist/*

  # ── Publish to crates.io ───────────────────────────────────────────
  publish-crate:
    name: publish crate
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish-release
    runs-on: llm-as-dom-runners
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --allow-dirty || echo "Version may already be published"

  # ── Publish to npm ─────────────────────────────────────────────────
  publish-npm:
    name: publish npm
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish-release
    runs-on: llm-as-dom-runners
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Sync version from VERSION file
        run: |
          VERSION=$(cat VERSION)
          cd npm
          node -e "const p=require('./package.json'); p.version='${VERSION}'; require('fs').writeFileSync('package.json', JSON.stringify(p,null,2)+'\n')"

      - name: Publish llm-as-dom-mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd npm && npm publish --access public || echo "Version may already be published"

  # ── Publish to PyPI ────────────────────────────────────────────────
  publish-pypi-aliases:
    name: publish pypi (aliases)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish-release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install Python build tools
        run: pip install build twine hatchling

      - name: Build PyPI Package llm-as-dom
        run: python -m build python/llm_as_dom

      - name: Publish PyPI Package (llm-as-dom)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: python/llm_as_dom/dist

      - name: Build PyPI Package llm-as-dom-mcp
        run: python -m build python/llm_as_dom_mcp_pkg

      - name: Publish PyPI Package (llm-as-dom-mcp)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: python/llm_as_dom_mcp_pkg/dist
