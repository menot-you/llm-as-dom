name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Security & Quality ─────────────────────────────────────────────
  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate code coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info

  msrv:
    name: msrv pinned
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@nightly-2025-01-01
      - name: cargo check
        run: cargo check --all-targets --all-features

  # ── Check ──────────────────────────────────────────────────────────
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test (unit only)
        run: cargo test

  # ── Build ──────────────────────────────────────────────────────────
  build:
    name: build release
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build lad
        run: cargo build --release --bin lad

      - name: Build llm-as-dom-mcp
        run: cargo build --release --bin llm-as-dom-mcp

      - name: Upload binaries
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: binaries-linux-x86_64
          path: |
            target/release/lad
            target/release/llm-as-dom-mcp

  # ── Fixture Tests ──────────────────────────────────────────────────
  fixture-tests:
    name: fixture tests (chrome + local server)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build release
        run: cargo build --release --bin lad

      - name: Run fixture smoke tests
        run: ./fixtures/smoke_test.sh ./target/release/lad

  # ── Integration ────────────────────────────────────────────────────
  integration:
    name: integration (chrome)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build release
        run: cargo build --release --bin lad

      - name: Smoke test — example.com extraction
        run: |
          timeout 60 ./target/release/lad --url "https://example.com" --extract-only || exit 1

      - name: Smoke test — HN login extraction
        run: |
          timeout 60 ./target/release/lad --url "https://news.ycombinator.com/login" --extract-only || exit 1

  # ── LLM Smoke Test (Z.AI) ───────────────────────────────────────────
  llm-smoke:
    name: llm smoke (Z.AI GLM)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      Z_AI_API_KEY: ${{ secrets.Z_AI_API_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run LLM benchmark (Z.AI models only)
        run: |
          python3 bench/run_benchmark.py 2>&1 | tee /tmp/bench-results.txt
          # Fail if any model scored 0
          if grep -q "0/4" /tmp/bench-results.txt; then
            echo "FAIL: at least one model scored 0/4"
            exit 1
          fi

      - name: Upload benchmark results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: llm-benchmark-results
          path: bench/results.json

  # auto-tag removed (using release-plz)
  # ── Release (cross-platform binaries) ──────────────────────────────
  release:
    name: release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check, build, fixture-tests, integration]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: macos-arm64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build WebKit bridge (macOS only)
        if: runner.os == 'macOS'
        run: |
          cd webkit-bridge
          swift build -c release
          cp .build/release/lad-webkit-bridge ../target/${{ matrix.target }}/release/ || true

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/lad dist/lad-${{ matrix.artifact }} || true
          cp target/${{ matrix.target }}/release/llm-as-dom-mcp dist/llm-as-dom-mcp-${{ matrix.artifact }} || true
          cp target/${{ matrix.target }}/release/lad-webkit-bridge dist/lad-webkit-bridge-${{ matrix.artifact }} 2>/dev/null || true

      - name: Upload release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-${{ matrix.artifact }}
          path: dist/

  # ── Publish GitHub Release ─────────────────────────────────────────
  publish-release:
    name: publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download linux artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-linux-x86_64
          path: dist/

      - name: Download macos artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-macos-arm64
          path: dist/

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        
      - name: Sign binaries
        run: |
          cosign sign-blob --yes dist/lad-linux-x86_64 --bundle dist/lad-linux-x86_64.bundle
          if [ -f dist/llm-as-dom-mcp-linux-x86_64 ]; then cosign sign-blob --yes dist/llm-as-dom-mcp-linux-x86_64 --bundle dist/llm-as-dom-mcp-linux-x86_64.bundle; fi
          cosign sign-blob --yes dist/lad-macos-arm64 --bundle dist/lad-macos-arm64.bundle
          if [ -f dist/llm-as-dom-mcp-macos-arm64 ]; then cosign sign-blob --yes dist/llm-as-dom-mcp-macos-arm64 --bundle dist/llm-as-dom-mcp-macos-arm64.bundle; fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          generate_release_notes: true
          files: dist/*

  # ── Publish to crates.io ───────────────────────────────────────────
  publish-crate:
    name: publish crate
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --allow-dirty || echo "Version may already be published"

  # ── Publish to npm ─────────────────────────────────────────────────
  publish-npm:
    name: publish npm
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Sync version from Cargo.toml
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          cd npm
          node -e "const p=require('./package.json'); p.version='${VERSION}'; require('fs').writeFileSync('package.json', JSON.stringify(p,null,2)+'\n')"

      - name: Publish llm-as-dom-mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd npm && npm publish --access public --provenance || echo "Version may already be published"

  # ── Publish to PyPI ────────────────────────────────────────────────
  publish-pypi:
    name: publish pypi
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish-release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Sync version from Cargo.toml
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          sed -i "s/^version = .*/version = \"${VERSION}\"/" python/pyproject.toml
          sed -i "s/^__version__ = .*/__version__ = \"${VERSION}\"/" python/llm_as_dom_mcp/__init__.py

      - name: Build python package
        run: |
          pip install build
          cd python && python -m build

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
