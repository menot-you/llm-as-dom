name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Check ──────────────────────────────────────────────────────────
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test (unit only)
        run: cargo test

  # ── Build ──────────────────────────────────────────────────────────
  build:
    name: build release
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2

      - name: Build lad
        run: cargo build --release --bin lad

      - name: Build lad-mcp
        run: cargo build --release --bin lad-mcp

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-linux-x86_64
          path: |
            target/release/lad
            target/release/lad-mcp

  # ── Integration ────────────────────────────────────────────────────
  integration:
    name: integration (chrome)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --bin lad

      - name: Smoke test — example.com extraction
        run: |
          timeout 60 ./target/release/lad --url "https://example.com" --extract-only || exit 1

      - name: Smoke test — HN login extraction
        run: |
          timeout 60 ./target/release/lad --url "https://news.ycombinator.com/login" --extract-only || exit 1

  # ── Release ────────────────────────────────────────────────────────
  release:
    name: release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check, build, integration]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: macos-arm64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/lad dist/lad-${{ matrix.artifact }} || true
          cp target/${{ matrix.target }}/release/lad-mcp dist/lad-mcp-${{ matrix.artifact }} || true

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact }}
          path: dist/

  publish-release:
    name: publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-linux-x86_64
          path: dist/

      - name: Download macos artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-macos-arm64
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
