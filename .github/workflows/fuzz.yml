name: Fuzz

on:
  schedule:
    - cron: '0 4 * * 1' # Monday 4am UTC
  workflow_dispatch:

env:
  RUSTFLAGS: "-D warnings"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  fuzz:
    name: Fuzz
    runs-on: llm-as-dom-runners
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install nightly Rust toolchain
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Run fuzz_parse_action
        run: cargo fuzz run fuzz_parse_action -- -max_total_time=300

      - name: Run fuzz_semantic_view
        run: cargo fuzz run fuzz_semantic_view -- -max_total_time=300

      - name: Upload crashes
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: crashes
          path: fuzz/artifacts/
