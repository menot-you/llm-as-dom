name: Fuzz

on:
  schedule:
    - cron: '0 4 * * 1' # Monday 4am UTC
  workflow_dispatch:

env:
  RUSTFLAGS: "-D warnings"

jobs:
  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Run fuzz_parse_action
        run: cargo fuzz run fuzz_parse_action -- -max_total_time=300

      - name: Run fuzz_semantic_view
        run: cargo fuzz run fuzz_semantic_view -- -max_total_time=300

      - name: Upload crashes
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crashes
          path: fuzz/artifacts/
